<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eye</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.ico">
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <header class="site-header">
            <img src="assets/logo.png" alt="Logo" class="logo" />
            <h1>The Eye</h1>
        </header>

        <div id="login-form">
            <input type="text" id="username" placeholder="username" autocomplete="off">
            <input type="password" id="password" placeholder="password">
            <div id="login-error"></div>
            <button id="login-btn" class="enter-btn"><span class="bracket left">[</span>&nbsp;ENTER<span class="cursor">_</span>&nbsp;<span class="bracket right">]</span></button>
        </div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="hidden">

        <div id="chat-sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="Logo" class="sidebar-logo" />
                <span>// CONTACTS</span>
            </div>
            <div class="contact-list"></div>
            <div id="self-info">
                <div id="self-info-row">
                    <span class="status-dot online-dot"></span>
                    <span id="self-username"></span>
                </div>
                <span id="self-status-text"></span>
            </div>
            <button id="logout-btn"><span class="bracket left">[</span>&nbsp;EXIT<span class="bracket right">]</span></button>
        </div>

        <div id="chat-main">
            <div id="chat-header">
                <span id="chat-with-label">// ...</span>
                <span id="chat-status-dot" class="status-dot online-dot"></span>
                <span id="chat-status-label" class="online-label">[ONLINE]</span>
            </div>

            <div id="message-feed"></div>

            <div id="typing-indicator" class="hidden">
                Calle is typing<span class="blink-cursor">_</span>
            </div>

            <div id="input-area">
                <span class="input-prefix">&gt;</span>
                <input type="text" id="message-input" placeholder="type a message..." autocomplete="off" spellcheck="false">
                <button id="send-btn"><span class="bracket left">[</span>&nbsp;SEND<span class="bracket right">]</span></button>
            </div>
        </div>

    </div>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    </style>
    <div id="watermark">made by cryptoler</div>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="java.js"></script>
</body>
</html>
