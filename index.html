<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script>(function(){ var t = localStorage.getItem('eye_theme'); if (t && t !== 'default') document.documentElement.setAttribute('data-theme', t); })();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Eye</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.ico">
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <header class="site-header">
            <img src="assets/logo.png" alt="Logo" class="logo" />
            <h1>The Eye</h1>
        </header>

        <div id="login-form">
            <input type="text" id="username" placeholder="username" autocomplete="off">
            <input type="password" id="password" placeholder="password">
            <div id="login-error"></div>
            <button id="login-btn" class="enter-btn"><span class="bracket left">[</span>&nbsp;ENTER<span class="cursor">_</span>&nbsp;<span class="bracket right">]</span></button>
        </div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="hidden">
        <div id="sidebar-backdrop"></div>

        <div id="chat-sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="Logo" class="sidebar-logo" />
                <span>// CONTACTS</span>
            </div>
            <div class="contact-filter-wrap">
                <span class="contact-filter-prefix">&gt;</span>
                <input type="text" id="contact-filter" placeholder="filter_" autocomplete="off" spellcheck="false">
            </div>
            <div class="contact-list"></div>
            <div id="self-info">
                <div id="self-info-row">
                    <span id="self-username"></span>
                </div>
                <span id="self-status-text"></span>
            </div>
            <button id="audio-toggle" class="sidebar-btn"><span class="bracket left">[</span>&nbsp;<span id="audio-toggle-text">AUDIO: ON</span><span class="bracket right">]</span></button>
            <button id="themes-btn" class="sidebar-btn"><span class="bracket left">[</span>&nbsp;THEMES<span class="bracket right">]</span></button>
            <button id="help-btn" class="sidebar-btn"><span class="bracket left">[</span>&nbsp;?&nbsp;<span class="bracket right">]</span></button>
            <button id="logout-btn" class="sidebar-btn"><span class="bracket left">[</span>&nbsp;EXIT<span class="bracket right">]</span></button>
        </div>

        <div id="chat-main">
            <div id="chat-header">
                <button id="sidebar-toggle"><span class="bracket left">[</span>&#x2261;<span class="bracket right">]</span></button>
                <span id="chat-with-label">// ...</span>
            </div>

            <div id="message-feed"></div>
            <div id="new-msg-indicator" class="hidden">&#x2193; <span id="new-msg-count">0</span> new messages</div>

            <div id="typing-indicator" class="hidden">
                Calle is typing<span class="blink-cursor">_</span>
            </div>

            <div id="cmd-hints" class="hidden"></div>

            <div id="input-area">
                <span class="input-prefix">&gt;</span>
                <input type="text" id="message-input" placeholder="type a message..." autocomplete="off" spellcheck="false">
                <button id="send-btn"><span class="bracket left">[</span>&nbsp;SEND<span class="bracket right">]</span></button>
            </div>
        </div>

        <!-- Help Modal -->
        <div id="help-modal" class="hidden">
            <div id="help-modal-backdrop"></div>
            <div id="help-modal-content">
                <div class="help-title">// KEYBOARD SHORTCUTS</div>
                <div class="help-section">
                    <div class="help-row"><span class="help-key">Alt + Up/Down</span><span class="help-desc">Switch between contacts</span></div>
                    <div class="help-row"><span class="help-key">Ctrl + K / J</span><span class="help-desc">Previous / next contact</span></div>
                    <div class="help-row"><span class="help-key">Enter</span><span class="help-desc">Send message</span></div>
                    <div class="help-row"><span class="help-key">Escape</span><span class="help-desc">Close this modal</span></div>
                </div>
                <div class="help-title">// COMMANDS</div>
                <div id="help-commands-section" class="help-section"></div>
                <button id="help-close-btn"><span class="bracket left">[</span>&nbsp;CLOSE<span class="bracket right">]</span></button>
            </div>
        </div>
    </div>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    </style>
    <div id="watermark">made by cryptoler & cale_exe</div>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="java.js"></script>
</body>
</html>
